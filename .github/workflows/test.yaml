name: Test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  FORCE_COLOR: 1

jobs:
  metadata:
    name: Metadata
    runs-on: ubuntu-latest
    outputs:
      has-tests: ${{ steps.collect.outputs.has-tests }}
      python-versions: ${{ steps.inspect.outputs.supported_python_classifiers_json_array }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - id: inspect
        name: Build and Inspect a Python Package
        uses: hynek/build-and-inspect-python-package@d44ca7d91762de7a7d5436ddae667c6da6d1c3df # v2
      - name: Setup Python
        uses: liblaf/actions/setup-python@30c85b7c83d5db558c3113c5a7297837f6fe4904 # v1
      - id: collect
        name: Collect
        run: |-
          if pytest --collect-only; then
            echo 'has-tests=true' >> "$GITHUB_OUTPUT"
          else
            code="$?"
            if (("$code" == 5)); then
              echo 'has-tests=false' >> "$GITHUB_OUTPUT"
            else
              exit "$code"
            fi
          fi

  test:
    name: Test
    permissions:
      id-token: write
    needs:
      - metadata
    if: needs.metadata.outputs.has-tests == 'true'
    runs-on: ubuntu-latest
    env:
      EAGER_IMPORT: true # ref: <https://github.com/scientific-python/lazy-loader?tab=readme-ov-file#early-failure>
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0 # I don't know why, but it is present in Codecov's documentation
      - name: Setup Python
        uses: liblaf/actions/setup-python@30c85b7c83d5db558c3113c5a7297837f6fe4904 # v1
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3
      - name: Test
        run: mise run test
      - if: success() || failure()
        name: Upload Coverage
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          use_oidc: true
      - if: success() || failure()
        name: Upload Test Results
        uses: codecov/test-results-action@0fa95f0e1eeaafde2c782583b36b28ad0d8c77d3 # v1
        with:
          use_oidc: true
    strategy:
